<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Retail Calculator</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      background-attachment: fixed;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #ffffff;
      padding: 20px 24px;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25), 0 0 1px rgba(0, 0, 0, 0.1);
      max-width: 420px;
      width: 100%;
      backdrop-filter: blur(10px);
    }
    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 28px;
      text-align: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #374151;
    }
    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border-radius: 4px;
      border: 1px solid #e0e7ff;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .btn {
      width: 100%;
      padding: 12px 12px;
      border-radius: 6px;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    .results {
      margin-top: 14px;
      border-top: 2px solid #e0e7ff;
      padding-top: 10px;
      font-size: 14px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
      padding: 12px;
      border-radius: 6px;
      margin-left: -12px;
      margin-right: -12px;
      padding-left: 12px;
      padding-right: 12px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .total {
      font-weight: 700;
      font-size: 18px;
      color: #667eea;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 2px solid #e0e7ff;
    }
    .error {
      margin-top: 6px;
      color: #b91c1c;
      font-size: 12px;
    }
    .footer {
      position: fixed;
      bottom: 16px;
      width: 100%;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%);
      color: #ffffff;
      padding: 10px 0;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Retail Calculator</h1>
    <div class="field">
      <label for="item">Item</label>
      <input id="item" type="text" placeholder="Item name" />
    </div>
    <div class="field">
      <label for="qty">Quantity</label>
      <input id="qty" type="number" min="0" step="1" value="1" />
    </div>
    <div class="field">
      <label for="price">Price</label>
      <input id="price" type="number" min="0" step="0.01" value="0" />
    </div>
    <div class="field">
      <label for="tax">Tax (%)</label>
      <input id="tax" type="number" min="0" step="0.01" value="18" />
    </div>
    <div class="field">
      <label for="taxType">Tax Type</label>
      <select id="taxType" style="width: 100%; padding: 8px 10px; border-radius: 4px; border: 1px solid #d1d5db; font-size: 14px;">
        <option value="exclusive">Tax Exclusive</option>
        <option value="inclusive">Tax Inclusive</option>
      </select>
    </div>
    <div class="field">
      <label for="discountType">Discount Type</label>
      <select id="discountType" style="width: 100%; padding: 8px 10px; border-radius: 4px; border: 1px solid #d1d5db; font-size: 14px;">
        <option value="none">No Discount</option>
        <option value="percentage">Percentage (%)</option>
        <option value="fixed">Fixed Amount</option>
      </select>
    </div>
    <div class="field" id="discountFieldPercent" style="display: none;">
      <label for="discountPercent">Discount Percentage</label>
      <input id="discountPercent" type="number" min="0" step="0.01" value="0" />
    </div>
    <div class="field" id="discountFieldAmount" style="display: none;">
      <label for="discountAmount">Discount Amount</label>
      <input id="discountAmount" type="number" min="0" step="0.01" value="0" />
    </div>
    <button class="btn" id="calcBtn">Calculate</button>
    <div id="error" class="error" style="display:none"></div>

    <div class="results">
      <div class="row">
        <span>Subtotal</span>
        <span id="subtotal">0.00</span>
      </div>
      <div class="row">
        <span>Discount</span>
        <span id="discount">0.00</span>
      </div>
      <div class="row">
        <span>After Discount</span>
        <span id="afterDiscount">0.00</span>
      </div>
      <div class="row">
        <span>Tax Amount</span>
        <span id="taxAmount">0.00</span>
      </div>
      <div class="row total">
        <span>Total</span>
        <span id="total">0.00</span>
      </div>
    </div>
  </div>

  <div class="footer">
    ✨ Powered by Ragavan
  </div>

  <script>
    function toggleDiscountField() {
      const discountType = document.getElementById('discountType').value;
      const percentField = document.getElementById('discountFieldPercent');
      const amountField = document.getElementById('discountFieldAmount');

      if (discountType === 'percentage') {
        percentField.style.display = 'block';
        amountField.style.display = 'none';
      } else if (discountType === 'fixed') {
        percentField.style.display = 'none';
        amountField.style.display = 'block';
      } else {
        percentField.style.display = 'none';
        amountField.style.display = 'none';
      }
    }

    function calculateTotal() {
      const qtyEl = document.getElementById('qty');
      const priceEl = document.getElementById('price');
      const taxEl = document.getElementById('tax');
      const taxTypeEl = document.getElementById('taxType');
      const discountTypeEl = document.getElementById('discountType');
      const discountPercentEl = document.getElementById('discountPercent');
      const discountAmountEl = document.getElementById('discountAmount');
      const errorEl = document.getElementById('error');

      const qty = parseFloat(qtyEl.value || '0');
      const price = parseFloat(priceEl.value || '0');
      const taxRate = parseFloat(taxEl.value || '0');
      const taxType = taxTypeEl.value;
      const discountType = discountTypeEl.value;

      if (isNaN(qty) || isNaN(price) || isNaN(taxRate)) {
        errorEl.textContent = 'Please enter numeric values for all fields.';
        errorEl.style.display = 'block';
        return;
      }
      if (qty < 0 || price < 0 || taxRate < 0) {
        errorEl.textContent = 'Values cannot be negative.';
        errorEl.style.display = 'block';
        return;
      }

      let totalDiscount = 0;
      if (discountType === 'percentage') {
        const discountPercent = parseFloat(discountPercentEl.value || '0');
        if (isNaN(discountPercent) || discountPercent < 0) {
          errorEl.textContent = 'Discount percentage must be a non-negative number.';
          errorEl.style.display = 'block';
          return;
        }
        if (discountPercent > 100) {
          errorEl.textContent = 'Discount percentage cannot exceed 100%.';
          errorEl.style.display = 'block';
          return;
        }
        totalDiscount = (qty * price) * (discountPercent / 100);
      } else if (discountType === 'fixed') {
        const discountAmount = parseFloat(discountAmountEl.value || '0');
        if (isNaN(discountAmount) || discountAmount < 0) {
          errorEl.textContent = 'Discount amount must be a non-negative number.';
          errorEl.style.display = 'block';
          return;
        }
        totalDiscount = discountAmount;
      }

      errorEl.style.display = 'none';

      let subtotal, baseAmount, taxAmount, afterDiscount, total;

      if (taxType === 'inclusive') {
        // Price includes tax
        subtotal = qty * price;
        // Extract base amount from inclusive price
        baseAmount = subtotal / (1 + taxRate / 100);
        const includedTax = subtotal - baseAmount;
        
        // Apply discount on base amount
        afterDiscount = Math.max(baseAmount - totalDiscount, 0);
        
        // Recalculate tax on discounted base
        taxAmount = afterDiscount * (taxRate / 100);
        total = afterDiscount + taxAmount;
      } else {
        // Tax is exclusive (default)
        subtotal = qty * price;
        afterDiscount = Math.max(subtotal - totalDiscount, 0);
        taxAmount = afterDiscount * (taxRate / 100);
        total = afterDiscount + taxAmount;
      }

      document.getElementById('subtotal').textContent = subtotal.toFixed(2);
      document.getElementById('discount').textContent = totalDiscount.toFixed(2);
      document.getElementById('afterDiscount').textContent = afterDiscount.toFixed(2);
      document.getElementById('taxAmount').textContent = taxAmount.toFixed(2);
      document.getElementById('total').textContent = total.toFixed(2);
    }

    document.getElementById('discountType').addEventListener('change', toggleDiscountField);
    document.getElementById('taxType').addEventListener('change', calculateTotal);
    document.getElementById('calcBtn').addEventListener('click', calculateTotal);

    // Recalculate when pressing Enter in any numeric field
    ['qty', 'price', 'tax', 'discountPercent', 'discountAmount'].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('keyup', function (e) {
        if (e.key === 'Enter') {
          calculateTotal();
        }
      });
    });
  </script>
</body>
</html>
